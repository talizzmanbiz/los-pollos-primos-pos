<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ee6206" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- index.html is shared by the public storefront and the POS, so the title
         must stay customer-facing: this is the SEO/social surface. -->
    <title>Los Pollos Primos · Pollo rostizado ahumado tropical en Chalchuapa</title>
    <meta
      name="description"
      content="Pollo rostizado marinado en jugo de piña y paprika ahumada. Pickup y delivery en Chalchuapa, Santa Ana. Pedí en línea en minutos."
    />

    <!-- Open Graph / social -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Los Pollos Primos" />
    <meta property="og:title" content="Los Pollos Primos · Ahumado Tropical" />
    <meta
      property="og:description"
      content="Pollo rostizado marinado en jugo de piña y paprika ahumada. Pedí en línea: pickup o delivery en Chalchuapa."
    />
    <meta property="og:image" content="/images/hero.webp" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Fonts: Poppins (display) + Inter (body) + JetBrains Mono (prices/qty).
         All three load here, not from index.css: `@import "tailwindcss"` is
         inlined at build time, so a font @import after it lands mid-stylesheet
         and browsers drop it (@import must precede all rules). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
